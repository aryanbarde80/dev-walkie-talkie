services:
  - type: web
    name: dev-walkie-talkie-backend
    env: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: FRONTEND_URL
        sync: false
        description: "The URL of your deployed frontend (e.g., https://your-app.vercel.app)"
